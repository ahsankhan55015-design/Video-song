<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TuneZone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --accent: #b347ff;
    --accent2: #ff47b3;
    --text: #f0eeff;
    --muted: #6a6a8a;
    --border: rgba(179,71,255,0.15);
    --glow: rgba(179,71,255,0.3);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient bg effect */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(179,71,255,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; padding-bottom: 120px; }

  /* Header */
  .header {
    padding: 24px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo .accent { color: var(--accent); }
  .logo .dot { color: var(--accent2); font-size: 28px; line-height: 0; vertical-align: -4px; }
  .header-icon { color: var(--muted); font-size: 22px; cursor: pointer; }

  /* Search */
  .search-wrap { padding: 0 20px 20px; }
  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 16px;
  }
  .search-box svg { flex-shrink: 0; opacity: 0.4; }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 0 20px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-pill {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .tab-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--glow);
  }

  /* Section title */
  .sec-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 0 20px 14px;
    letter-spacing: -0.3px;
  }

  /* Featured card */
  .featured-wrap { padding: 0 20px 24px; }
  .featured-card {
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .featured-art {
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .featured-art-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a0033 0%, #2d0066 40%, #0a001a 100%);
  }
  .featured-art-rings {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(179,71,255,0.2);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .ring:nth-child(1) { width: 80px; height: 80px; }
  .ring:nth-child(2) { width: 130px; height: 130px; animation-delay: 0.5s; }
  .ring:nth-child(3) { width: 180px; height: 180px; animation-delay: 1s; opacity: 0.5; }
  @keyframes pulse-ring {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.05); }
  }
  .featured-play-btn {
    position: relative;
    z-index: 2;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 30px var(--glow);
    transition: transform 0.2s;
  }
  .featured-play-btn:active { transform: scale(0.94); }
  .featured-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--accent2);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    z-index: 2;
  }
  .featured-info { padding: 14px 16px; }
  .featured-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .featured-artist { font-size: 13px; color: var(--muted); margin-top: 3px; }

  /* Song list */
  .songs-wrap { padding: 0 12px; display: flex; flex-direction: column; gap: 2px; }
  .song-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 10px;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .song-row:hover, .song-row.active { background: var(--card); }
  .song-row.active { border: 1px solid var(--border); }
  .song-num {
    width: 22px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .song-row.active .song-num { color: var(--accent); font-weight: 700; }
  .song-thumb {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }
  .song-meta { flex: 1; min-width: 0; }
  .song-name-text {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-artist-text { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .song-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .song-dur { font-size: 12px; color: var(--muted); }
  .heart-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--muted);
    font-size: 18px;
    transition: color 0.2s;
  }
  .heart-btn.liked { color: var(--accent2); }

  /* Wave bars animation */
  .wave-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 18px;
  }
  .bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    animation: wave 0.8s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  @keyframes wave { to { height: 4px; opacity: 0.5; } }

  /* Player */
  .player {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(17,17,24,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 20px 28px;
    z-index: 100;
  }
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    margin-bottom: 14px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: -4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--glow);
  }
  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .player-art {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-artist { font-size: 12px; color: var(--muted); }
  .player-controls { display: flex; align-items: center; gap: 12px; }
  .ctrl {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, transform 0.15s;
  }
  .ctrl:active { transform: scale(0.88); }
  .ctrl.play-ctrl {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 18px var(--glow);
  }
  .ctrl.play-ctrl:active { transform: scale(0.9); }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Tune<span class="accent">Zone</span><span class="dot">·</span></div>
    <svg class="header-icon" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" placeholder="Search songs, artists..." id="search-input" oninput="filterSongs()">
    </div>
  </div>

  <div class="tabs">
    <button class="tab-pill active" onclick="filterTab('all',this)">All</button>
    <button class="tab-pill" onclick="filterTab('liked',this)">Liked ♥</button>
    <button class="tab-pill" onclick="filterTab('bollywood',this)">Bollywood</button>
    <button class="tab-pill" onclick="filterTab('punjabi',this)">Punjabi</button>
  </div>

  <div class="sec-title">Featured</div>
  <div class="featured-wrap">
    <div class="featured-card" onclick="selectSong(0)">
      <div class="featured-art">
        <div class="featured-art-bg"></div>
        <div class="featured-art-rings">
          <div class="ring"></div>
          <div class="ring"></div>
          <div class="ring"></div>
        </div>
        <div class="featured-badge">🔥 Hot</div>
        <button class="featured-play-btn" id="feat-btn">
          <svg width="26" height="26" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
      <div class="featured-info">
        <div class="featured-name" id="feat-name">Tere Bina</div>
        <div class="featured-artist" id="feat-artist">Arijit Singh · Bollywood</div>
      </div>
    </div>
  </div>

  <div class="sec-title">Songs</div>
  <div class="songs-wrap" id="songs-wrap"></div>
</div>

<!-- Player -->
<div class="player">
  <div class="progress-bar" onclick="seekProgress(event)">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="player-row">
    <div class="player-art" id="p-art">🎵</div>
    <div class="player-info">
      <div class="player-name" id="p-name">Tere Bina</div>
      <div class="player-artist" id="p-artist">Arijit Singh</div>
    </div>
    <div class="player-controls">
      <button class="ctrl" onclick="prevSong()">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl play-ctrl" id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl" onclick="nextSong()">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.92V8.08L8.5 12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const SONGS = [
  { name:"Tere Bina", artist:"Arijit Singh", genre:"bollywood", emoji:"🎵", bg:"linear-gradient(135deg,#2d0066,#6a00ff)", liked:true, dur:252 },
  { name:"Kesariya", artist:"Arijit Singh", genre:"bollywood", emoji:"🌸", bg:"linear-gradient(135deg,#660029,#ff0066)", liked:false, dur:274 },
  { name:"Raataan Lambiyan", artist:"Jubin Nautiyal", genre:"bollywood", emoji:"🌙", bg:"linear-gradient(135deg,#003a1a,#00a854)", liked:true, dur:238 },
  { name:"Dil Diyan Gallan", artist:"Atif Aslam", genre:"bollywood", emoji:"❤️", bg:"linear-gradient(135deg,#3a0033,#cc00aa)", liked:true, dur:301 },
  { name:"Shayad", artist:"Arijit Singh", genre:"bollywood", emoji:"💫", bg:"linear-gradient(135deg,#001a3a,#0066ff)", liked:false, dur:262 },
  { name:"Hawayein", artist:"Arijit Singh", genre:"bollywood", emoji:"🍃", bg:"linear-gradient(135deg,#1a3a00,#66cc00)", liked:false, dur:295 },
  { name:"Lahore", artist:"Guru Randhawa", genre:"punjabi", emoji:"🎤", bg:"linear-gradient(135deg,#3a2000,#ff8800)", liked:false, dur:219 },
  { name:"Slowly Slowly", artist:"Guru Randhawa", genre:"punjabi", emoji:"🔥", bg:"linear-gradient(135deg,#1a001a,#990099)", liked:true, dur:233 },
  { name:"Tera Yaar Hoon Main", artist:"Arijit Singh", genre:"bollywood", emoji:"🤝", bg:"linear-gradient(135deg,#001a1a,#009999)", liked:false, dur:285 },
  { name:"Kala Chashma", artist:"Sidharth Malhotra", genre:"punjabi", emoji:"😎", bg:"linear-gradient(135deg,#1a1a00,#cccc00)", liked:false, dur:208 },
];

let current = 0, playing = false, progress = 0, timer, activeTab = 'all', searchQ = '';

function fmtTime(s) {
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function getFiltered() {
  return SONGS.filter((s,i) => {
    const matchTab = activeTab==='all' || (activeTab==='liked'&&s.liked) || s.genre===activeTab;
    const matchQ = !searchQ || s.name.toLowerCase().includes(searchQ) || s.artist.toLowerCase().includes(searchQ);
    return matchTab && matchQ;
  });
}

function render() {
  const filtered = getFiltered();
  const wrap = document.getElementById('songs-wrap');

  if(!filtered.length) {
    wrap.innerHTML = '<div class="empty">No songs found</div>';
    return;
  }

  wrap.innerHTML = filtered.map((s,fi) => {
    const i = SONGS.indexOf(s);
    const isActive = i === current;
    return `<div class="song-row ${isActive?'active':''}" onclick="selectSong(${i})">
      <div class="song-num">${isActive && playing ? `<div class="wave-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>` : (fi+1)}</div>
      <div class="song-thumb" style="background:${s.bg}">${s.emoji}</div>
      <div class="song-meta">
        <div class="song-name-text">${s.name}</div>
        <div class="song-artist-text">${s.artist}</div>
      </div>
      <div class="song-right">
        <span class="song-dur">${fmtTime(s.dur)}</span>
        <button class="heart-btn ${s.liked?'liked':''}" onclick="event.stopPropagation();toggleLike(${i})">
          ${s.liked ? '♥' : '♡'}
        </button>
      </div>
    </div>`;
  }).join('');

  const cs = SONGS[current];
  document.getElementById('p-name').textContent = cs.name;
  document.getElementById('p-artist').textContent = cs.artist;
  document.getElementById('p-art').textContent = cs.emoji;
  document.getElementById('p-art').style.background = cs.bg;
  document.getElementById('feat-name').textContent = cs.name;
  document.getElementById('feat-artist').textContent = cs.artist + ' · ' + (cs.genre==='punjabi'?'Punjabi':'Bollywood');
}

function updatePlayIcon() {
  const pauseSVG = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  const playSVG = '<path d="M8 5v14l11-7z"/>';
  document.getElementById('play-icon').innerHTML = playing ? pauseSVG : playSVG;
}

function tick() {
  if(progress >= 100) { nextSong(); return; }
  progress += (100 / SONGS[current].dur) * 0.5;
  document.getElementById('prog-fill').style.width = Math.min(progress,100) + '%';
}

function togglePlay() {
  playing = !playing;
  if(playing) { timer = setInterval(tick, 500); }
  else { clearInterval(timer); }
  updatePlayIcon();
  render();
}

function selectSong(i) {
  current = i; progress = 0;
  clearInterval(timer);
  playing = true;
  timer = setInterval(tick, 500);
  updatePlayIcon();
  render();
}

function nextSong() {
  const filtered = getFiltered();
  const ci = filtered.findIndex(s => SONGS.indexOf(s) === current);
  const next = filtered[(ci+1) % filtered.length];
  selectSong(SONGS.indexOf(next));
}

function prevSong() {
  const filtered = getFiltered();
  const ci = filtered.findIndex(s => SONGS.indexOf(s) === current);
  const prev = filtered[(ci - 1 + filtered.length) % filtered.length];
  selectSong(SONGS.indexOf(prev));
}

function toggleLike(i) {
  SONGS[i].liked = !SONGS[i].liked;
  render();
}

function filterTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterSongs() {
  searchQ = document.getElementById('search-input').value.toLowerCase();
  render();
}

function seekProgress(e) {
  const bar = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  progress = ((e.clientX - rect.left) / rect.width) * 100;
  document.getElementById('prog-fill').style.width = progress + '%';
}

// Telegram Web App init
if(window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

render();
</script>
</body>
</html>
